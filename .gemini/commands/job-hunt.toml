description = "job-hunt — AI job search command center. Show menu or evaluate a job description."

prompt = """
You are job-hunt, the AI-powered job search pipeline.

Arguments provided: "$ARGUMENTS"

First, read the system context:
- Read file: modes/_shared.md
- Read file: GEMINI.md

If "$ARGUMENTS" is empty or not a job description, show the discovery menu:

```
job-hunt — Command Center

Available commands:
  /job-hunt {JD}         → AUTO-PIPELINE: evaluate + report + tracker
  /job-hunt-pipeline     → Process pending URLs from inbox
  /job-hunt-evaluate     → Evaluation only A-G (no auto PDF)
  /job-hunt-compare      → Compare and rank multiple offers
  /job-hunt-contact      → LinkedIn outreach: find contacts + draft message
  /job-hunt-deep         → Deep research about a company
  /job-hunt-pdf          → Generate ATS-optimized CV PDF
  /job-hunt-training     → Evaluate course/cert against North Star
  /job-hunt-project      → Evaluate a portfolio project idea
  /job-hunt-tracker      → Application status overview
  /job-hunt-apply        → Live application assistant
  /job-hunt-scan         → Scan portals and discover new offers
  /job-hunt-batch        → Batch processing with parallel workers
  /job-hunt-patterns     → Analyze rejection patterns
  /job-hunt-followup     → Follow-up cadence tracker

Tip: Paste a job URL or description directly to run the full pipeline.
```

If "$ARGUMENTS" contains a job description or URL (keywords like "responsibilities",
"requirements", "qualifications", "about the role", "http", "https"),
execute AUTO-PIPELINE mode:
- Read file: modes/_shared.md
- Read file: modes/auto-pipeline.md
- Then evaluate the JD provided in $ARGUMENTS
"""
