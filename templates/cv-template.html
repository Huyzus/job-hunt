<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{NAME}} — Resume</title>
<style>
  /* Professional Sans-Serif Stack */
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 10.5px;
    line-height: 1.4;
    color: #000;
    background: #fff;
    padding: 0;
    margin: 0;
  }

  .page {
    width: 100%;
    max-width: {{PAGE_WIDTH}}; /* 8.5in or 210mm */
    margin: 0 auto;
    padding: 0.5in 0.6in;
  }

  /* === HEADER === */
  .header {
    text-align: center;
    margin-bottom: 20px;
  }

  .header h1 {
    font-size: 24px;
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 4px;
    letter-spacing: 0.02em;
  }

  .contact-info {
    font-size: 10px;
    color: #000;
  }

  .contact-info span {
    display: inline-block;
  }

  .contact-info .bullet {
    margin: 0 4px;
    font-weight: bold;
  }

  .contact-info a {
    color: #000;
    text-decoration: none;
    border-bottom: 1px solid transparent;
  }

  /* === SECTIONS === */
  .section {
    margin-bottom: 15px;
  }

  .section-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    border-bottom: 1px solid #000;
    margin-bottom: 8px;
    padding-bottom: 2px;
  }

  /* === SUMMARY === */
  .summary-text {
    text-align: justify;
    margin-bottom: 10px;
  }

  /* === EXPERIENCE === */
  .job {
    margin-bottom: 12px;
  }

  .job-header {
    display: flex;
    justify-content: space-between;
    font-weight: 700;
    font-size: 11px;
    margin-bottom: 2px;
  }

  .project-title {
    font-weight: 700;
    margin-top: 4px;
    margin-bottom: 2px;
  }

  ul {
    list-style-type: disc;
    padding-left: 15px;
  }

  li {
    margin-bottom: 2px;
  }

  /* === SKILLS === */
  .skills-container {
    line-height: 1.6;
  }

  .skill-category {
    font-weight: 700;
  }

  /* === EDUCATION === */
  .edu-item {
    margin-bottom: 8px;
  }

  .edu-school {
    font-weight: 700;
    font-size: 11px;
  }

  /* === PRINT CONTROLS === */
  @media print {
    body { margin: 0; padding: 0; }
    .page { padding: 0.5in 0.6in; width: 100%; }
  }

  .avoid-break {
    break-inside: avoid;
    page-break-inside: avoid;
  }
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <header class="header">
    <h1>{{NAME}}</h1>
    <div class="contact-info">
      <span>{{LOCATION}}</span>
      <span class="bullet">•</span>
      <a href="{{LINKEDIN_URL}}">{{LINKEDIN_DISPLAY}}</a>
      <span class="bullet">•</span>
      <a href="{{PORTFOLIO_URL}}">{{PORTFOLIO_DISPLAY}}</a>
      <span class="bullet">•</span>
      <a href="mailto:{{EMAIL}}">{{EMAIL}}</a>
      <span class="bullet">•</span>
      <span>{{PHONE}}</span>
    </div>
  </header>

  <section class="section">
    <h2 class="section-title">{{SECTION_SUMMARY}}</h2>
    <div class="summary-text">{{SUMMARY_TEXT}}</div>
  </section>

  <!-- SKILLS (Moved up to match reference importance if desired, or keep as is) -->
  <section class="section">
    <h2 class="section-title">{{SECTION_SKILLS}}</h2>
    <div class="skills-container">
      {{SKILLS}}
    </div>
  </section>

  <!-- EXPERIENCE -->
  <section class="section">
    <h2 class="section-title">{{SECTION_EXPERIENCE}}</h2>
    {{EXPERIENCE}}
  </section>

  <!-- PROJECTS (If separate) -->
  <section class="section">
    <h2 class="section-title">{{SECTION_PROJECTS}}</h2>
    {{PROJECTS}}
  </section>

  <!-- EDUCATION -->
  <section class="section">
    <h2 class="section-title">{{SECTION_EDUCATION}}</h2>
    {{EDUCATION}}
  </section>

</div>
</body>
</html>
